<div class="header">
    <div id="successMessage" class="success-banner" style="display:none;"></div>
    <script>
        const message = localStorage.getItem("carAdded");
         if (message) {
        const banner = document.getElementById("successMessage");
        banner.textContent = message;
        banner.style.display = "block";
        localStorage.removeItem("carAdded");
        setTimeout(() => banner.style.display = "none", 5000);
    }
    </script>
    <div class="logo">
        <img src="{{ url_for('static', filename='uploads/logo.jpg') }}" alt="a200" style="width: 300px;">
    </div>
    <div class="header-title">
        <h1>AUTOMOTIVE - BIG BUSINESS</h1>
    </div>
    <div class="header-search header-search-vertical">
        <form id="searchForm">
            <div class="search-row">
                <label for="query">Search</label>
                <input type="text" id="query" placeholder="Search...">
                <button class="btn-search" type="submit">Search</button>
            </div>
            <div class="search-row">
                <label for="sortSelect">Sort</label>
                <select id="sortSelect" name="sort">
                    <option value="">Default</option>
                    <option value="high_price">High price</option>
                    <option value="low_price">Low price</option>
                    <option value="alphabet">Alphabet</option>
                </select>
            </div>
        </form>
        <div class="search-row">
            <label>Add Car</label>
            <a class="btn-add btn-add-top" href="{{ url_for('car_bp.add_car_page') }}">Add Car</a>
        </div>
    </div>
</div>

<div class="section-header">
    <h2>Search Results</h2>
</div>
<div id="results" class="results-container"></div>

<div class="section-header">
    <h2>Available Cars</h2>
</div>
<div class="cars-table-container" id="initialTable">
    {% if cars %}
        <table class="car-table">
            <thead>
                <tr>
                    <th>Photo</th>
                    <th>Model</th>
                    <th>Brand</th>
                    <th>Year</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody>
                {% for car in cars %}
                    <tr>
                        <td><img class="table-car-image" src="{{ url_for('static', filename='uploads/' ~ (car.img or 'uploads/default.jpg')) }}" alt="{{ car.model }}"></td>
                        <td>{{ car.model }}</td>
                        <td>{{ car.brandName }}</td>
                        <td>{{ car.productionYear }}</td>
                        <td>${{ car.price }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>No cars available yet.</p>
    {% endif %}
</div>

<script src="{{ url_for('static', filename='assets/js/script.js') }}"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='assets/css/style.css') }}">
</link>
